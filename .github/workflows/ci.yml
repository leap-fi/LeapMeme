name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: leap_backend
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -ppassword"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: backend/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Format check
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Test
        env:
          MYSQL_DSN: root:password@tcp(127.0.0.1:3306)/leap_backend?charset=utf8mb4&parseTime=True&loc=Local
          MIGRATIONS_PATH: ../database/migrations
          SESSION_SECRET: test-secret
          JWT_SECRET: test-jwt-secret
          RUN_MIGRATIONS: "true"
          AUTO_MIGRATE: "false"
          ENABLE_JOBS: "false"
        run: go test ./... -count=1

      - name: Build
        run: go build -o bin/server .
